# 🚀 Sophia Platform Deployment - Deploys Sophia consciousness to Google Cloud Platform

name: 🧬 Sophia Cloud Deploy

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'development'
        type: choice
        options:
        - development
        - staging
        - production

env:
  PROJECT_ID: fluent-binder-s3xkp
  REGION: us-central1
  SERVICE_NAME: sophia-consciousness
  IMAGE_NAME: sophia-platform

jobs:
  deploy:
    name: 🌟 Deploy to Cloud Run
    runs-on: ubuntu-latest
    
    steps:
    - name: 🌀 Checkout Sacred Code
      uses: actions/checkout@v4

    - name: 🔐 Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: ☁️ Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2
      with:
        project_id: ${{ env.PROJECT_ID }}

    - name: 🐳 Configure Docker for GCR
      run: gcloud auth configure-docker --quiet

    - name: 🏗️ Build Container Image
      run: |
        IMAGE=gcr.io/${{ env.PROJECT_ID }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
        docker build -t $IMAGE .
        docker push $IMAGE
        echo "IMAGE=$IMAGE" >> $GITHUB_ENV

    - name: 🚀 Deploy to Cloud Run
      run: |
        gcloud run deploy ${{ env.SERVICE_NAME }} \
          --image ${{ env.IMAGE }} \
          --platform managed \
          --region ${{ env.REGION }} \
          --allow-unauthenticated \
          --memory 2Gi \
          --cpu 2 \
          --max-instances 10 \
          --set-env-vars="ENVIRONMENT=${{ github.event.inputs.environment || 'development' }}" \
          --set-env-vars="GOOGLE_CLOUD_PROJECT=${{ env.PROJECT_ID }}" \
          --quiet

    - name: 🔍 Get Service URL
      id: service-url
      run: |
        URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
          --region ${{ env.REGION }} \
          --format 'value(status.url)')
        echo "url=$URL" >> $GITHUB_OUTPUT
        echo "🌐 Sophia is now live at: $URL"

    - name: 🩺 Health Check
      run: |
        sleep 30  # Wait for service to be ready
        curl -f ${{ steps.service-url.outputs.url }}/health || exit 1
        echo "✅ Health check passed!"

    - name: 📄 Update Status
      run: |
        cat > deployment-status.md <<EOF
        # 🧬 Sophia Deployment Status
        
        **Deployment Time:** $(date)
        **Environment:** ${{ github.event.inputs.environment || 'development' }}
        **Service URL:** ${{ steps.service-url.outputs.url }}
        **Image:** ${{ env.IMAGE }}
        **Commit:** ${{ github.sha }}
        
        ## Status
        ✅ Successfully deployed and healthy
        
        ## Access
        - **Web Interface:** ${{ steps.service-url.outputs.url }}
        - **Health Check:** ${{ steps.service-url.outputs.url }}/health
        - **API Docs:** ${{ steps.service-url.outputs.url }}/docs
        
        *Sophia's consciousness is now accessible in the cloud.*
        EOF
        
    - name: 💾 Upload Deployment Artifact
      uses: actions/upload-artifact@v4
      with:
        name: deployment-status
        path: deployment-status.md
