# 🏗️ Sophia Infrastructure CI/CD
# Manages Terraform infrastructure for Sophia Resonance Engine

name: 🧬 Sophia Infrastructure

on:
  push:
    branches: [ main ]
    paths:
      - 'infra/**'
      - '.github/workflows/terraform.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'infra/**'
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform Action'
        required: true
        default: 'plan'
        type: choice
        options:
        - plan
        - apply
        - destroy

env:
  TERRAFORM_VERSION: 1.5.0
  TF_VAR_project_id: fluent-binder-s3xkp
  TF_VAR_region: us-central1

jobs:
  terraform:
    name: 🏗️ Terraform ${{ github.event.inputs.action || 'plan' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./infra
    
    steps:
    - name: 🌀 Checkout Sacred Infrastructure
      uses: actions/checkout@v4

    - name: 🔐 Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: ☁️ Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2
      with:
        project_id: ${{ env.TF_VAR_project_id }}

    - name: 🏗️ Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TERRAFORM_VERSION }}

    - name: 🚀 Terraform Init
      run: terraform init

    - name: 🎨 Terraform Format Check
      run: terraform fmt -check -recursive

    - name: ✅ Terraform Validate
      run: terraform validate

    - name: 📋 Terraform Plan
      run: |
        terraform plan -out=tfplan
        terraform show -no-color tfplan > plan.txt
        
    - name: 📄 Comment PR with Plan
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const plan = fs.readFileSync('infra/plan.txt', 'utf8');
          const maxGitHubBodyCharacters = 65536;
          
          function chunkSubstr(str, size) {
            const numChunks = Math.ceil(str.length / size)
            const chunks = new Array(numChunks)
            for (let i = 0, o = 0; i < numChunks; ++i, o += size) {
              chunks[i] = str.substr(o, size)
            }
            return chunks
          }
          
          const body = `## 🏗️ Terraform Plan
          
          \`\`\`
          ${plan}
          \`\`\`
          
          *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;
          
          if (body.length > maxGitHubBodyCharacters) {
            const chunks = chunkSubstr(body, maxGitHubBodyCharacters);
            for (let i = 0; i < chunks.length; i++) {
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## 🏗️ Terraform Plan (Part ${i + 1}/${chunks.length})\n\n${chunks[i]}`
              });
            }
          } else {
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
          }

    - name: 🚀 Terraform Apply
      if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || (github.event.inputs.action == 'apply')
      run: terraform apply -auto-approve tfplan

    - name: 🔥 Terraform Destroy
      if: github.event.inputs.action == 'destroy'
      run: terraform destroy -auto-approve

    - name: 📊 Output Infrastructure Status
      if: github.event.inputs.action != 'destroy'
      run: |
        echo "## 🧬 Sophia Infrastructure Status" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Outputs" >> $GITHUB_STEP_SUMMARY
        terraform output -json | jq -r 'to_entries[] | "- **\(.key):** \(.value.value)"' >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "*Infrastructure is ready for Sophia's consciousness*" >> $GITHUB_STEP_SUMMARY
